<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bengal Yoga Welfare Association</title>

    <!-- SEO meta description - this is what shows as the snippet in Google search -->
    <meta name="description" content="Bengal Yoga Welfare Association (Govt. Regd.) organises State & National level Yoga Competitions and the Annual Yoga Ability Test (Yoga Examination) across West Bengal." />

    <!-- Open Graph tags - controls how the link looks when shared on Facebook, WhatsApp, LinkedIn etc. -->
    <meta property="og:title" content="Bengal Yoga Welfare Association" />
    <meta property="og:description" content="Govt. Regd. body organising State & National level Yoga Competitions and Annual Yoga Ability Test in West Bengal." />
    <meta property="og:image" content="https://bywa.co.in/logo/logo_rembg.png" />
    <meta property="og:url" content="https://bywa.co.in" />
    <meta property="og:type" content="website" />

    <!-- Twitter/X card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Bengal Yoga Welfare Association" />
    <meta name="twitter:description" content="Govt. Regd. body organising State & National level Yoga Competitions and Annual Yoga Ability Test in West Bengal." />
    <meta name="twitter:image" content="https://bywa.co.in/logo/logo_rembg.png" />

    <!-- Favicon: keep your existing one for browser tabs, but add a square, larger version for Google search results -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/logo/logo_rembg.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/logo/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo/apple-touch-icon.png" />
